<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HYTE Y70 | BTC LUXE TERMINAL</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#05060a;
      --glass:rgba(255,255,255,.06);
      --line:rgba(255,255,255,.18);
      --cyan:#00f6ff;
      --blue:#2b7bff;
      --gold:#ffb84d;
      --green:#00ff9d;
      --red:#ff4b4b;
      --text:#f4fbff;
      --muted:#9ab1bd;
      --shadow-cyan:0 0 24px rgba(0,246,255,.45), 0 0 60px rgba(0,246,255,.25);
      --shadow-gold:0 0 24px rgba(255,184,77,.35), 0 0 60px rgba(255,184,77,.20);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
      background: radial-gradient(1200px 700px at 80% -10%, rgba(43,123,255,.22), transparent 60%),
                  radial-gradient(900px 700px at -10% 90%, rgba(0,246,255,.18), transparent 60%),
                  linear-gradient(180deg,#07090e 0%, #04050a 100%);
      color:var(--text);
      font-family:'Rajdhani',system-ui,sans-serif;
    }

    body::before{
      content:"";
      position:fixed; inset:0;
      background:
        linear-gradient(rgba(0,246,255,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,246,255,.06) 1px, transparent 1px);
      background-size:56px 56px;
      mask-image: radial-gradient(circle at center, black 35%, transparent 95%);
      animation:gridShift 14s linear infinite;
      pointer-events:none;
      z-index:0;
    }

    body::after{
      content:"";
      position:fixed; inset:0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.02) 0px,
        rgba(255,255,255,.02) 1px,
        transparent 2px,
        transparent 4px
      );
      mix-blend-mode:soft-light;
      pointer-events:none;
      z-index:0;
    }

    @keyframes gridShift{
      from { transform:translateY(0); }
      to   { transform:translateY(56px); }
    }

    .particles{
      position:fixed; inset:0; z-index:1; pointer-events:none;
      overflow:hidden;
    }

    .particle{
      position:absolute;
      width:3px; height:3px;
      border-radius:50%;
      background:var(--cyan);
      opacity:.45;
      box-shadow:0 0 12px var(--cyan), 0 0 28px var(--cyan);
      animation:floatUp linear infinite;
    }

    @keyframes floatUp{
      from{ transform:translateY(110vh) translateX(0); opacity:0; }
      10%{ opacity:.6; }
      90%{ opacity:.6; }
      to{ transform:translateY(-20vh) translateX(30px); opacity:0; }
    }

    .app{
      position:relative;
      z-index:2;
      width:100vw;
      height:100vh;
      padding:28px;
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:18px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:16px 20px;
      border:1px solid var(--line);
      background:linear-gradient(135deg, rgba(255,255,255,.09), rgba(255,255,255,.04));
      backdrop-filter: blur(12px);
      border-radius:18px;
      box-shadow: var(--shadow-cyan);
    }

    .brand{
      display:flex; align-items:center; gap:16px;
      letter-spacing:1px;
    }

    .btc{
      font-family:'Orbitron',sans-serif;
      font-size:54px; line-height:1;
      color:var(--gold);
      text-shadow:var(--shadow-gold);
      animation:pulseGold 2.2s ease-in-out infinite alternate;
    }

    @keyframes pulseGold{
      from { transform:scale(1); }
      to   { transform:scale(1.06); }
    }

    .title{
      font-family:'Orbitron',sans-serif;
      font-size:22px;
      font-weight:800;
    }
    .subtitle{
      color:var(--muted);
      font-size:13px;
      text-transform:uppercase;
      letter-spacing:2px;
      margin-top:2px;
    }

    .status{
      display:flex; align-items:center; gap:10px;
      color:#b7fef1;
      font-weight:700;
      letter-spacing:1px;
    }
    .dot{
      width:10px; height:10px; border-radius:50%;
      background:var(--green);
      box-shadow:0 0 12px var(--green), 0 0 24px var(--green);
      animation:blink 1.2s infinite;
    }
    @keyframes blink{
      0%,100%{opacity:1}
      50%{opacity:.35}
    }

    .main{
      display:grid;
      grid-template-columns: 1.25fr .75fr;
      gap:18px;
      min-height:0;
    }

    .panel{
      border:1px solid var(--line);
      border-radius:22px;
      background:linear-gradient(140deg, rgba(255,255,255,.09), rgba(255,255,255,.03));
      backdrop-filter: blur(14px);
      box-shadow: 0 0 0 1px rgba(255,255,255,.04) inset, var(--shadow-cyan);
      padding:20px;
      min-height:0;
    }

    .price-wrap{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-bottom:10px;
    }

    .pair{
      color:var(--muted);
      font-size:14px;
      letter-spacing:2px;
      text-transform:uppercase;
    }

    .price{
      font-family:'Orbitron',sans-serif;
      font-size:clamp(38px, 7vw, 100px);
      font-weight:900;
      line-height:1.05;
      text-shadow:0 0 24px rgba(0,246,255,.5);
      transition:transform .2s ease;
      word-break:break-word;
    }
    .price.flash{ animation:flash .45s ease; }
    @keyframes flash{
      50%{ color:var(--cyan); text-shadow:0 0 30px var(--cyan); transform:scale(1.01); }
    }

    .change{
      font-family:'Orbitron',sans-serif;
      font-size:clamp(18px, 2.8vw, 36px);
      font-weight:800;
      margin-top:2px;
    }
    .up{ color:var(--green); text-shadow:0 0 18px rgba(0,255,157,.45); }
    .down{ color:var(--red); text-shadow:0 0 18px rgba(255,75,75,.4); }

    canvas{
      width:100%;
      height:300px;
      border:1px solid rgba(0,246,255,.25);
      border-radius:16px;
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      margin-top:12px;
      display:block;
    }

    .right{
      display:grid;
      grid-template-rows: repeat(5, 1fr);
      gap:14px;
      min-height:0;
    }

    .card{
      border:1px solid var(--line);
      border-radius:16px;
      background:var(--glass);
      backdrop-filter: blur(10px);
      padding:14px 16px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      box-shadow:0 0 22px rgba(0,246,255,.12);
    }

    /* Bigger labels + values */
    .label{
      font-size:18px;
      letter-spacing:2.5px;
      color:var(--muted);
      text-transform:uppercase;
      font-weight:700;
    }

    .value{
      margin-top:6px;
      font-family:'Orbitron',sans-serif;
      font-weight:800;
      font-size:clamp(24px, 2.8vw, 38px);
      color:#eaffff;
      text-shadow:0 0 12px rgba(0,246,255,.35);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .footer{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      border:1px solid var(--line);
      border-radius:16px;
      background:linear-gradient(135deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
      padding:12px 16px;
      font-size:14px;
      color:var(--muted);
      letter-spacing:1px;
      box-shadow:0 0 18px rgba(0,246,255,.14);
    }

    .clock{
      font-family:'Orbitron',sans-serif;
      color:var(--cyan);
      text-shadow:0 0 14px rgba(0,246,255,.35);
      font-size:clamp(14px, 1.8vw, 22px);
    }

    .footer strong{
      color:#dff9ff;
      font-weight:700;
      letter-spacing:2px;
    }

    @media (max-width: 980px){
      .app{ padding:16px; gap:12px; }
      .main{ grid-template-columns:1fr; }
      .right{ grid-template-columns:1fr 1fr; grid-template-rows:auto auto auto; }
      .card:last-child{ grid-column:1 / -1; }
      canvas{ height:240px; }
      .topbar{ padding:12px 14px; }
      .btc{ font-size:44px; }
      .title{ font-size:18px; }

      /* Mobile label/value sizes */
      .label{ font-size:16px; }
      .value{ font-size:clamp(22px, 4.8vw, 34px); }
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>

  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="btc">₿</div>
        <div>
          <div class="title">HYTE Y70 • BTC LUXE TERMINAL</div>
          <div class="subtitle">Binance Spot Feed • Cyber Edition</div>
        </div>
      </div>
      <div class="status"><span class="dot"></span>LIVE</div>
    </header>

    <section class="main">
      <article class="panel">
        <div class="price-wrap">
          <div class="pair">BTC / USDT</div>
          <div class="price" id="price">LOADING...</div>
          <div class="change" id="change">--</div>
        </div>
        <canvas id="chart"></canvas>
      </article>

      <aside class="right">
        <div class="card">
          <div class="label">24H HIGH</div>
          <div class="value" id="high">--</div>
        </div>
        <div class="card">
          <div class="label">24H LOW</div>
          <div class="value" id="low">--</div>
        </div>
        <div class="card">
          <div class="label">24H VOLUME (BTC)</div>
          <div class="value" id="volume">--</div>
        </div>
        <div class="card">
          <div class="label">24H QUOTE VOLUME (USDT)</div>
          <div class="value" id="quoteVolume">--</div>
        </div>
        <div class="card">
          <div class="label">24H RANGE</div>
          <div class="value" id="range">--</div>
        </div>
      </aside>
    </section>

    <footer class="footer">
      <div><strong>ULTRA MODE</strong> • PREMIUM CYBER GLASS UI</div>
      <div class="clock" id="clock">--</div>
    </footer>
  </div>

  <script>
    const particlesContainer = document.getElementById('particles');
    for(let i=0;i<28;i++){
      const p=document.createElement('span');
      p.className='particle';
      p.style.left=Math.random()*100+'vw';
      p.style.animationDuration=(9+Math.random()*10)+'s';
      p.style.animationDelay=(-Math.random()*18)+'s';
      p.style.opacity=(.25+Math.random()*.55).toFixed(2);
      p.style.transform=`scale(${(0.7+Math.random()*1.3).toFixed(2)})`;
      particlesContainer.appendChild(p);
    }

    const canvas = document.getElementById("chart");
    const ctx = canvas.getContext("2d");

    let prices = [];
    const maxPoints = 120;

    function resizeCanvas(){
      canvas.width = canvas.clientWidth;
      canvas.height = canvas.clientHeight;
      drawChart();
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    function drawChart(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      if(prices.length < 2) return;

      const min = Math.min(...prices);
      const max = Math.max(...prices);
      const range = (max-min) || 1;
      const pad = 18;

      const grad = ctx.createLinearGradient(0,0,canvas.width,0);
      grad.addColorStop(0,"#00f6ff");
      grad.addColorStop(.5,"#2b7bff");
      grad.addColorStop(1,"#ffb84d");

      ctx.beginPath();
      prices.forEach((p,i)=>{
        const x = i*(canvas.width/(maxPoints-1));
        const y = canvas.height - (((p-min)/range)*(canvas.height-pad*2)+pad);
        if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      });

      ctx.strokeStyle = grad;
      ctx.lineWidth = 4;
      ctx.shadowBlur = 20;
      ctx.shadowColor = "rgba(0,246,255,.7)";
      ctx.stroke();

      ctx.lineTo(canvas.width, canvas.height);
      ctx.lineTo(0, canvas.height);
      ctx.closePath();

      const fill = ctx.createLinearGradient(0,0,0,canvas.height);
      fill.addColorStop(0,"rgba(0,246,255,.26)");
      fill.addColorStop(1,"rgba(0,246,255,0)");
      ctx.shadowBlur = 0;
      ctx.fillStyle = fill;
      ctx.fill();
    }

    function fmtUSD(n, decimals=2){
      return "$" + Number(n).toLocaleString(undefined,{
        minimumFractionDigits:decimals,
        maximumFractionDigits:decimals
      });
    }

    function fmtCompact(n){
      return Number(n).toLocaleString(undefined,{maximumFractionDigits:2});
    }

    async function updateBTC(){
      try{
        const res = await fetch("https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT");
        const d = await res.json();

        const price = parseFloat(d.lastPrice);
        const high = parseFloat(d.highPrice);
        const low = parseFloat(d.lowPrice);
        const change = parseFloat(d.priceChangePercent);
        const vol = parseFloat(d.volume);
        const qVol = parseFloat(d.quoteVolume);

        prices.push(price);
        if(prices.length>maxPoints) prices.shift();
        drawChart();

        const priceEl = document.getElementById("price");
        priceEl.classList.remove("flash");
        void priceEl.offsetWidth;
        priceEl.classList.add("flash");
        priceEl.textContent = fmtUSD(price,2);

        const changeEl = document.getElementById("change");
        changeEl.textContent = (change>=0?"+":"") + change.toFixed(2) + "%";
        changeEl.className = "change " + (change>=0 ? "up":"down");

        document.getElementById("high").textContent = fmtUSD(high,2);
        document.getElementById("low").textContent = fmtUSD(low,2);
        document.getElementById("volume").textContent = fmtCompact(vol);
        document.getElementById("quoteVolume").textContent = fmtUSD(qVol,0);
        document.getElementById("range").textContent = fmtUSD(high-low,2);
      }catch(err){
        document.getElementById("price").textContent = "OFFLINE";
      }
    }

    function updateClock(){
      document.getElementById("clock").textContent = new Date().toLocaleString();
    }

    updateBTC();
    updateClock();
    setInterval(updateBTC, 1000);
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
