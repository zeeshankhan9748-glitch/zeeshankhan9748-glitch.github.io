<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HYTE Y70 | BTC QUANTUM TERMINAL X</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg0:#03040a;
      --bg1:#060913;
      --glass:rgba(255,255,255,.06);
      --line:rgba(180,230,255,.2);
      --text:#eaf8ff;
      --muted:#8ea8b8;
      --cyan:#00f6ff;
      --blue:#2b7bff;
      --violet:#8b5cf6;
      --gold:#ffb84d;
      --green:#00ff9d;
      --red:#ff4b63;

      --shadow-cyan:0 0 25px rgba(0,246,255,.35), 0 0 75px rgba(0,246,255,.14);
      --shadow-gold:0 0 20px rgba(255,184,77,.35), 0 0 60px rgba(255,184,77,.18);
      --shadow-deep:0 14px 40px rgba(0,0,0,.45);
    }

    *{margin:0;padding:0;box-sizing:border-box}
    html,body{
      width:100%;height:100%;overflow:hidden;
      background:
        radial-gradient(1200px 600px at 10% 110%, rgba(0,246,255,.20), transparent 60%),
        radial-gradient(1000px 700px at 100% -10%, rgba(43,123,255,.22), transparent 60%),
        radial-gradient(900px 500px at 50% 120%, rgba(139,92,246,.18), transparent 55%),
        linear-gradient(180deg,var(--bg1),var(--bg0));
      color:var(--text);
      font-family:'Rajdhani',system-ui,sans-serif;
    }

    /* Grid */
    body::before{
      content:"";
      position:fixed;inset:0;z-index:0;pointer-events:none;
      background:
        linear-gradient(rgba(0,246,255,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,246,255,.06) 1px, transparent 1px);
      background-size:54px 54px;
      -webkit-mask-image:radial-gradient(circle at center, #000 36%, transparent 95%);
      mask-image:radial-gradient(circle at center, #000 36%, transparent 95%);
      animation:gridMove 16s linear infinite;
    }

    /* Scanlines */
    body::after{
      content:"";
      position:fixed;inset:0;z-index:0;pointer-events:none;
      background:repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.028) 0,
        rgba(255,255,255,.028) 1px,
        transparent 2px,
        transparent 4px
      );
      mix-blend-mode:soft-light;
    }

    @keyframes gridMove{
      from{transform:translateY(0)}
      to{transform:translateY(54px)}
    }

    .particles{
      position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;
    }
    .particle{
      position:absolute;
      width:3px;height:3px;border-radius:999px;
      background:var(--cyan);
      opacity:.55;
      box-shadow:0 0 12px var(--cyan),0 0 28px var(--cyan);
      animation:floatUp linear infinite;
    }
    @keyframes floatUp{
      from{transform:translateY(110vh) translateX(0);opacity:0}
      8%{opacity:.65}
      92%{opacity:.65}
      to{transform:translateY(-20vh) translateX(35px);opacity:0}
    }

    .app{
      position:relative;z-index:2;
      width:100vw;height:100vh;
      padding:22px;
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:16px;
    }

    .topbar,.panel,.card,.footer{
      position:relative;
      overflow:hidden;
      border:1px solid var(--line);
      border-radius:18px;
      background:linear-gradient(140deg, rgba(255,255,255,.10), rgba(255,255,255,.03));
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      box-shadow:var(--shadow-deep), var(--shadow-cyan);
    }

    /* animated border glow */
    .topbar::before,.panel::before,.card::before,.footer::before{
      content:"";
      position:absolute;
      inset:-1px;
      border-radius:inherit;
      padding:1px;
      background:linear-gradient(
        120deg,
        rgba(0,246,255,0),
        rgba(0,246,255,.55),
        rgba(255,184,77,.35),
        rgba(139,92,246,.45),
        rgba(0,246,255,0)
      );
      -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite:xor;
      mask-composite:exclude;
      opacity:.62;
      pointer-events:none;
      animation:borderFlow 6s linear infinite;
    }
    @keyframes borderFlow{
      0%{filter:hue-rotate(0deg);transform:translateX(-7%)}
      50%{filter:hue-rotate(40deg);transform:translateX(7%)}
      100%{filter:hue-rotate(0deg);transform:translateX(-7%)}
    }

    .holo{
      position:absolute;inset:0;pointer-events:none;
      background:linear-gradient(115deg, transparent 36%, rgba(255,255,255,.12) 49%, transparent 63%);
      transform:translateX(-130%);
      animation:holoSweep 4.5s ease-in-out infinite;
      mix-blend-mode:screen;
    }
    @keyframes holoSweep{
      0%,12%{transform:translateX(-130%);opacity:0}
      22%,58%{opacity:.7}
      100%{transform:translateX(130%);opacity:0}
    }

    .topbar{
      display:flex;align-items:center;justify-content:space-between;
      padding:14px 18px;
    }

    .brand{display:flex;align-items:center;gap:14px}
    .btc{
      font-family:'Orbitron',sans-serif;
      font-size:50px;line-height:1;
      color:var(--gold);
      text-shadow:var(--shadow-gold);
      animation:logoPulse 2.2s ease-in-out infinite alternate;
    }
    @keyframes logoPulse{
      from{transform:scale(1)}
      to{transform:scale(1.07)}
    }

    .title{
      font-family:'Orbitron',sans-serif;
      font-weight:900;
      font-size:20px;
      letter-spacing:.8px;
    }
    .subtitle{
      margin-top:2px;
      font-size:12px;
      letter-spacing:2.2px;
      text-transform:uppercase;
      color:var(--muted);
    }

    .status{
      display:flex;align-items:center;gap:9px;
      font-weight:700;letter-spacing:1px;color:#befff4;
    }
    .dot{
      width:10px;height:10px;border-radius:50%;
      background:var(--green);
      box-shadow:0 0 12px var(--green),0 0 28px var(--green);
      animation:blink 1.1s infinite;
    }
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}

    .main{
      display:grid;
      grid-template-columns:1.28fr .72fr;
      gap:16px;
      min-height:0;
    }

    .panel{padding:16px;min-height:0}
    .price-wrap{display:flex;flex-direction:column;gap:6px}
    .pair{
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:2.4px;
      font-size:13px;
    }

    .price{
      font-family:'Orbitron',sans-serif;
      font-size:clamp(40px,7.2vw,108px);
      font-weight:900;
      line-height:1.04;
      text-shadow:0 0 28px rgba(0,246,255,.55);
      transition:transform .2s ease;
      word-break:break-word;
    }
    .price.flash{animation:flash .48s ease}
    @keyframes flash{
      50%{color:var(--cyan);text-shadow:0 0 36px var(--cyan);transform:scale(1.012)}
    }

    .change{
      font-family:'Orbitron',sans-serif;
      font-size:clamp(22px,3vw,38px);
      font-weight:800;
      margin-top:2px;
    }
    .up{color:var(--green);text-shadow:0 0 20px rgba(0,255,157,.45)}
    .down{color:var(--red);text-shadow:0 0 20px rgba(255,75,99,.45)}

    canvas{
      width:100%;
      height:320px;
      margin-top:10px;
      border-radius:16px;
      border:1px solid rgba(0,246,255,.28);
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      display:block;
      box-shadow:inset 0 0 30px rgba(0,246,255,.08);
    }

    .right{
      display:grid;
      grid-template-rows:repeat(6,1fr);
      gap:12px;
      min-height:0;
    }

    .card{
      padding:12px 14px;
      display:flex;flex-direction:column;justify-content:center;
      transform-style:preserve-3d;
      transition:transform .22s ease, box-shadow .22s ease;
    }
    .card:hover{
      transform:perspective(700px) rotateX(2.6deg) rotateY(-2.8deg) translateY(-3px);
      box-shadow:0 0 40px rgba(0,246,255,.36), var(--shadow-deep);
    }

    .label{
      font-size:18px;
      letter-spacing:2.6px;
      text-transform:uppercase;
      color:var(--muted);
      font-weight:700;
    }

    .value{
      margin-top:4px;
      font-family:'Orbitron',sans-serif;
      font-size:clamp(24px,2.8vw,38px);
      font-weight:800;
      color:#ecfbff;
      text-shadow:0 0 14px rgba(0,246,255,.38);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }

    .footer{
      padding:11px 14px;
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      color:var(--muted);
      font-size:13px;letter-spacing:1px;
    }
    .footer strong{
      color:#eaffff;
      letter-spacing:2px;
      font-family:'Orbitron',sans-serif;
      font-weight:700;
      font-size:12px;
    }
    .clock{
      font-family:'Orbitron',sans-serif;
      color:var(--cyan);
      text-shadow:0 0 16px rgba(0,246,255,.4);
      font-size:clamp(14px,1.8vw,21px);
    }

    /* Portrait tuning (HYTE Y70 style) */
    @media (max-width:980px){
      .app{padding:14px;gap:12px}
      .main{grid-template-columns:1fr}
      canvas{height:240px}
      .right{
        grid-template-columns:1fr 1fr;
        grid-template-rows:auto auto auto;
      }
      .card:last-child,.card:nth-last-child(2){
        grid-column:1/-1;
      }
      .btc{font-size:42px}
      .title{font-size:16px}
      .subtitle{font-size:11px}
      .label{font-size:16px}
      .value{font-size:clamp(22px,4.8vw,34px)}
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>

  <div class="app">
    <header class="topbar">
      <div class="holo"></div>
      <div class="brand">
        <div class="btc">₿</div>
        <div>
          <div class="title">HYTE Y70 • BTC QUANTUM TERMINAL X</div>
          <div class="subtitle">Binance Spot Feed • Neural Glass Interface</div>
        </div>
      </div>
      <div class="status"><span class="dot"></span>LIVE</div>
    </header>

    <section class="main">
      <article class="panel">
        <div class="holo"></div>
        <div class="price-wrap">
          <div class="pair">BTC / USDT</div>
          <div class="price" id="price">LOADING...</div>
          <div class="change" id="change">--</div>
        </div>
        <canvas id="chart"></canvas>
      </article>

      <aside class="right">
        <div class="card">
          <div class="holo"></div>
          <div class="label">24H HIGH</div>
          <div class="value" id="high">--</div>
        </div>

        <div class="card">
          <div class="holo"></div>
          <div class="label">24H LOW</div>
          <div class="value" id="low">--</div>
        </div>

        <div class="card">
          <div class="holo"></div>
          <div class="label">24H VOLUME (BTC)</div>
          <div class="value" id="volume">--</div>
        </div>

        <div class="card">
          <div class="holo"></div>
          <div class="label">24H QUOTE VOL (USDT)</div>
          <div class="value" id="quoteVolume">--</div>
        </div>

        <div class="card">
          <div class="holo"></div>
          <div class="label">24H RANGE</div>
          <div class="value" id="range">--</div>
        </div>

        <div class="card">
          <div class="holo"></div>
          <div class="label">AI SENTIMENT</div>
          <div class="value" id="sentiment">NEUTRAL</div>
        </div>
      </aside>
    </section>

    <footer class="footer">
      <div class="holo"></div>
      <div><strong>ULTRA MODE</strong> • BILLION-DOLLAR CYBER GLASS DESIGN</div>
      <div class="clock" id="clock">--</div>
    </footer>
  </div>

  <script>
    // particles
    const particlesContainer = document.getElementById("particles");
    for(let i=0;i<34;i++){
      const p=document.createElement("span");
      p.className="particle";
      p.style.left=(Math.random()*100)+"vw";
      p.style.animationDuration=(9+Math.random()*11)+"s";
      p.style.animationDelay=(-Math.random()*18)+"s";
      p.style.opacity=(.22+Math.random()*.55).toFixed(2);
      p.style.transform=`scale(${(0.65+Math.random()*1.45).toFixed(2)})`;
      particlesContainer.appendChild(p);
    }

    const canvas = document.getElementById("chart");
    const ctx = canvas.getContext("2d");

    let prices=[];
    const maxPoints=140;

    function resizeCanvas(){
      canvas.width=canvas.clientWidth;
      canvas.height=canvas.clientHeight;
      drawChart();
    }
    addEventListener("resize", resizeCanvas);
    resizeCanvas();

    function drawChart(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      if(prices.length<2) return;

      const min=Math.min(...prices);
      const max=Math.max(...prices);
      const range=(max-min)||1;
      const pad=18;

      const grad=ctx.createLinearGradient(0,0,canvas.width,0);
      grad.addColorStop(0,"#00f6ff");
      grad.addColorStop(.48,"#2b7bff");
      grad.addColorStop(1,"#ffb84d");

      // line
      ctx.beginPath();
      prices.forEach((p,i)=>{
        const x=i*(canvas.width/(maxPoints-1));
        const y=canvas.height-(((p-min)/range)*(canvas.height-pad*2)+pad);
        if(i===0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
      });

      ctx.strokeStyle=grad;
      ctx.lineWidth=4;
      ctx.shadowBlur=22;
      ctx.shadowColor="rgba(0,246,255,.75)";
      ctx.stroke();

      // area fill
      ctx.lineTo(canvas.width, canvas.height);
      ctx.lineTo(0, canvas.height);
      ctx.closePath();

      const fill=ctx.createLinearGradient(0,0,0,canvas.height);
      fill.addColorStop(0,"rgba(0,246,255,.28)");
      fill.addColorStop(1,"rgba(0,246,255,0)");
      ctx.shadowBlur=0;
      ctx.fillStyle=fill;
      ctx.fill();
    }

    function fmtUSD(n, d=2){
      return "$"+Number(n).toLocaleString(undefined,{
        minimumFractionDigits:d,
        maximumFractionDigits:d
      });
    }

    function fmtCompact(n){
      return Number(n).toLocaleString(undefined,{maximumFractionDigits:2});
    }

    function animateTextValue(el, from, to, formatter, ms=420){
      const start=performance.now();
      function frame(t){
        const p=Math.min((t-start)/ms,1);
        const eased=1-Math.pow(1-p,3);
        const v=from+(to-from)*eased;
        el.textContent=formatter(v);
        if(p<1) requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }

    async function updateBTC(){
      try{
        const res=await fetch("https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT");
        const d=await res.json();

        const price=parseFloat(d.lastPrice);
        const high=parseFloat(d.highPrice);
        const low=parseFloat(d.lowPrice);
        const change=parseFloat(d.priceChangePercent);
        const vol=parseFloat(d.volume);
        const qVol=parseFloat(d.quoteVolume);

        prices.push(price);
        if(prices.length>maxPoints) prices.shift();
        drawChart();

        const priceEl=document.getElementById("price");
        priceEl.classList.remove("flash");
        void priceEl.offsetWidth;
        priceEl.classList.add("flash");
        priceEl.textContent=fmtUSD(price,2);

        const changeEl=document.getElementById("change");
        changeEl.textContent=(change>=0?"+":"")+change.toFixed(2)+"%";
        changeEl.className="change "+(change>=0?"up":"down");

        const highEl=document.getElementById("high");
        const lowEl=document.getElementById("low");
        const volEl=document.getElementById("volume");
        const qVolEl=document.getElementById("quoteVolume");
        const rangeEl=document.getElementById("range");
        const sentEl=document.getElementById("sentiment");

        const pHigh=Number(highEl.dataset.v ?? high);
        const pLow=Number(lowEl.dataset.v ?? low);
        const pVol=Number(volEl.dataset.v ?? vol);
        const pQVol=Number(qVolEl.dataset.v ?? qVol);
        const pRange=Number(rangeEl.dataset.v ?? (high-low));

        animateTextValue(highEl,pHigh,high,v=>fmtUSD(v,2));
        animateTextValue(lowEl,pLow,low,v=>fmtUSD(v,2));
        animateTextValue(volEl,pVol,vol,v=>fmtCompact(v));
        animateTextValue(qVolEl,pQVol,qVol,v=>fmtUSD(v,0));
        animateTextValue(rangeEl,pRange,(high-low),v=>fmtUSD(v,2));

        highEl.dataset.v=high;
        lowEl.dataset.v=low;
        volEl.dataset.v=vol;
        qVolEl.dataset.v=qVol;
        rangeEl.dataset.v=(high-low);

        if(change>1.5){
          sentEl.textContent="BULLISH";
          sentEl.style.color="#00ff9d";
          sentEl.style.textShadow="0 0 20px rgba(0,255,157,.55)";
        }else if(change<-1.5){
          sentEl.textContent="BEARISH";
          sentEl.style.color="#ff4b63";
          sentEl.style.textShadow="0 0 20px rgba(255,75,99,.55)";
        }else{
          sentEl.textContent="NEUTRAL";
          sentEl.style.color="#eaf8ff";
          sentEl.style.textShadow="0 0 16px rgba(0,246,255,.35)";
        }

      }catch(e){
        document.getElementById("price").textContent="OFFLINE";
      }
    }

    function updateClock(){
      document.getElementById("clock").textContent=new Date().toLocaleString();
    }

    updateBTC();
    updateClock();
    setInterval(updateBTC,1000);
    setInterval(updateClock,1000);
  </script>
</body>
</html>
