<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>HYTE Y70 BTC Cyber Terminal</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{

width:100%;
height:100%;

overflow:hidden;

background:#05070a;

font-family:'Orbitron',sans-serif;

color:white;

}


/* Animated Cyber Grid */

body::before{

content:"";

position:absolute;

inset:0;

background:

linear-gradient(
rgba(0,255,255,.05) 1px,
transparent 1px
),

linear-gradient(
90deg,
rgba(0,255,255,.05) 1px,
transparent 1px
);

background-size:50px 50px;

animation:gridMove 15s linear infinite;

}


@keyframes gridMove{

from{
transform:translateY(0);
}

to{
transform:translateY(50px);
}

}



/* Floating particles */

.particles{

position:absolute;

width:100%;
height:100%;

overflow:hidden;

z-index:1;

}


.particles:before{

content:"";

position:absolute;

width:5px;
height:5px;

background:#00ffff;

border-radius:50%;


box-shadow:

100px 200px cyan,
250px 500px cyan,
450px 150px cyan,
700px 600px cyan,
900px 250px cyan,
1200px 800px cyan,
1500px 350px cyan;


animation:float 12s infinite linear;

}


@keyframes float{

from{

transform:translateY(0);

opacity:.2;

}

50%{

opacity:1;

}

to{

transform:translateY(-1200px);

opacity:0;

}

}




.container{

position:relative;

z-index:2;

width:100vw;

height:100vh;

padding:45px;

display:flex;

flex-direction:column;

justify-content:space-between;

}



/* BTC Logo */

.logo{

text-align:center;

font-size:130px;

color:#f7931a;


animation:pulse 2s infinite alternate;

}



@keyframes pulse{


from{

text-shadow:

0 0 20px #f7931a,
0 0 50px #f7931a;

}


to{

text-shadow:

0 0 60px #ffcc66,
0 0 120px #f7931a;

}


}




.symbol{

text-align:center;

font-size:28px;

letter-spacing:6px;

color:#aaa;

}



.price{

text-align:center;

margin-top:25px;

font-size:95px;

font-weight:900;

color:white;

text-shadow:

0 0 30px cyan;

}



.priceFlash{

animation:flash .5s;

}


@keyframes flash{

50%{

color:#00ffff;

}

}



.change{

text-align:center;

font-size:40px;

margin-top:15px;

font-weight:bold;

}



.header::after{

content:"";

display:block;

height:2px;

margin-top:30px;


background:

linear-gradient(

90deg,

transparent,

cyan,

transparent

);


box-shadow:

0 0 25px cyan;

}



canvas{

width:100%;

height:260px;

margin-top:35px;


background:

rgba(255,255,255,.05);


border:

1px solid rgba(0,255,255,.3);


border-radius:25px;


backdrop-filter:blur(20px);

}

.cards{

display:grid;

grid-template-columns:1fr 1fr;

gap:25px;

margin-top:35px;

}



.card{

background:

rgba(255,255,255,.06);


border:

1px solid rgba(0,255,255,.25);


border-radius:25px;


padding:30px;


text-align:center;


backdrop-filter:

blur(20px);


box-shadow:

0 0 30px rgba(0,255,255,.12);


transition:.3s;

}



.card:hover{

transform:translateY(-5px);


box-shadow:

0 0 50px cyan;

}



.label{

font-size:18px;

color:#888;

letter-spacing:2px;

}



.value{

font-size:34px;

margin-top:12px;

font-weight:700;

text-shadow:

0 0 15px cyan;

}





.clock{

text-align:center;

font-size:32px;

color:#00ffff;

margin-top:20px;


text-shadow:

0 0 20px cyan;

}




.footer{

text-align:center;

font-size:18px;

color:#666;

letter-spacing:4px;


}



.green{

color:#00ff88;

text-shadow:

0 0 25px #00ff88;

}



.red{

color:#ff3333;

text-shadow:

0 0 25px red;

}





/* HYTE Y70 Portrait Optimization */

@media(max-width:800px){


.container{

padding:30px;

}



.logo{

font-size:110px;

}



.price{

font-size:80px;

}



canvas{

height:220px;

}


.cards{

gap:15px;

}



.value{

font-size:28px;

}


}



</style>

</head>


<body>


<div class="particles"></div>


<div class="container">



<div class="header">


<div class="logo">

₿

</div>



<div class="symbol">

BINANCE BTC / USDT

</div>



<div class="price" id="price">

LOADING...

</div>



<div class="change" id="change">

--

</div>


</div>





<canvas id="chart"></canvas>





<div class="cards">



<div class="card">

<div class="label">

24H HIGH

</div>

<div class="value" id="high">

--

</div>

</div>





<div class="card">

<div class="label">

24H LOW

</div>

<div class="value" id="low">

--

</div>

</div>





<div class="card">

<div class="label">

24H VOLUME

</div>

<div class="value" id="volume">

--

</div>

</div>





<div class="card">

<div class="label">

MARKET

</div>

<div class="value">

LIVE

</div>

</div>


</div>





<div class="clock" id="clock">

--

</div>





<div class="footer">

HYTE Y70 TOUCH • BTC CYBER TERMINAL

</div>



</div>

<script>


const canvas = document.getElementById("chart");

const ctx = canvas.getContext("2d");


let prices=[];

const maxPoints=80;



function resizeCanvas(){

canvas.width=canvas.offsetWidth;

canvas.height=canvas.offsetHeight;

}


resizeCanvas();


window.addEventListener(
"resize",
resizeCanvas
);



function drawChart(){


ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);



if(prices.length<2) return;



let min=Math.min(...prices);

let max=Math.max(...prices);


let range=max-min || 1;



let gradient=
ctx.createLinearGradient(
0,
0,
canvas.width,
0
);



gradient.addColorStop(
0,
"#00ffff"
);


gradient.addColorStop(
0.5,
"#0088ff"
);


gradient.addColorStop(
1,
"#f7931a"
);



ctx.beginPath();



prices.forEach(
(p,i)=>{


let x =
i *
(canvas.width/(maxPoints-1));


let y =
canvas.height -
(
((p-min)/range)
*
(canvas.height-40)
)
-20;



if(i===0)

ctx.moveTo(x,y);

else

ctx.lineTo(x,y);


}

);



ctx.strokeStyle=gradient;

ctx.lineWidth=5;

ctx.shadowBlur=25;

ctx.shadowColor="#00ffff";

ctx.stroke();


/* Fill area */

ctx.lineTo(
canvas.width,
canvas.height
);

ctx.lineTo(
0,
canvas.height
);

ctx.closePath();


let fill=
ctx.createLinearGradient(
0,
0,
0,
canvas.height
);


fill.addColorStop(
0,
"rgba(0,255,255,.35)"
);


fill.addColorStop(
1,
"rgba(0,255,255,0)"
);



ctx.fillStyle=fill;

ctx.fill();


}





async function updateBTC(){


try{


const response =
await fetch(
"https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT"
);



const data =
await response.json();



const price =
parseFloat(data.lastPrice);



prices.push(price);



if(prices.length>maxPoints)

prices.shift();



drawChart();




const priceBox =
document.getElementById("price");



priceBox.classList.remove(
"priceFlash"
);



void priceBox.offsetWidth;



priceBox.classList.add(
"priceFlash"
);




priceBox.innerHTML =

"$"+
price.toLocaleString(
undefined,
{
minimumFractionDigits:2,
maximumFractionDigits:2
}
);





const change =
parseFloat(
data.priceChangePercent
);



const changeBox =
document.getElementById("change");



changeBox.innerHTML =

(change>=0?"+":"")
+
change.toFixed(2)
+
"%";




if(change>=0){


changeBox.className="change green";


}else{


changeBox.className="change red";


}




document.getElementById("high").innerHTML=

"$"+
Number(data.highPrice)
.toLocaleString();




document.getElementById("low").innerHTML=

"$"+
Number(data.lowPrice)
.toLocaleString();




document.getElementById("volume").innerHTML=

(Number(data.volume)/1000)
.toFixed(1)
+
"K BTC";



}

catch(error){


document.getElementById("price").innerHTML=
"OFFLINE";


}

}





function updateClock(){


document.getElementById("clock").innerHTML=

new Date()
.toLocaleString();



}



updateBTC();


setInterval(
updateBTC,
1000
);



setInterval(
updateClock,
1000
);



</script>


</body>

</html>
