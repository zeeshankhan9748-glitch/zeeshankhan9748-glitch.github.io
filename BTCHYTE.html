<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BTC TRILLION TERMINAL • IFRAME OPTIMIZED</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#07111e;
      --bg2:#0a1526;
      --panel:rgba(13,25,44,.74);
      --line:#1ed3e6;
      --lineSoft:rgba(30,211,230,.35);
      --txt:#e9fbff;
      --muted:#8ca9bc;
      --cyan:#28e8ff;
      --blue:#2e8bff;
      --gold:#ffb84d;
      --green:#00ff9d;
      --red:#ff4f67;
    }

    *{margin:0;padding:0;box-sizing:border-box}

    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
      font-family:'Rajdhani',sans-serif;
      color:var(--txt);
      background:
        radial-gradient(1000px 600px at -10% 100%, rgba(40,232,255,.15), transparent 58%),
        radial-gradient(900px 600px at 110% -10%, rgba(46,139,255,.18), transparent 58%),
        linear-gradient(180deg,var(--bg2),var(--bg));
    }

    body::before{
      content:"";
      position:fixed;inset:0;pointer-events:none;
      background:
        linear-gradient(rgba(40,232,255,.06) 1px,transparent 1px),
        linear-gradient(90deg,rgba(40,232,255,.06) 1px,transparent 1px);
      background-size:34px 34px;
      opacity:.28;
    }

    .app{
      width:100%;
      height:100%;
      padding:10px;
      display:grid;
      grid-template-rows:auto auto 1fr auto;
      gap:8px;
    }

    .glass{
      position:relative;
      border:1px solid var(--lineSoft);
      border-radius:12px;
      background:linear-gradient(145deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      box-shadow:
        0 0 0 1px rgba(255,255,255,.03) inset,
        0 0 20px rgba(30,211,230,.16);
      overflow:hidden;
    }

    .glass::after{
      content:"";
      position:absolute;
      inset:-1px;
      border-radius:inherit;
      padding:1px;
      background:linear-gradient(115deg, transparent, rgba(40,232,255,.55), transparent);
      -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
      -webkit-mask-composite:xor;
      mask-composite:exclude;
      pointer-events:none;
      opacity:.55;
    }

    .top{
      padding:8px 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
    }

    .btc{
      font-family:'Orbitron',sans-serif;
      font-size:22px;
      color:var(--gold);
      text-shadow:0 0 14px rgba(255,184,77,.45);
      line-height:1;
    }

    .titles{
      min-width:0;
    }

    .title{
      font-family:'Orbitron',sans-serif;
      font-weight:800;
      font-size:11px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .sub{
      font-size:9px;
      color:var(--muted);
      letter-spacing:1.2px;
      text-transform:uppercase;
    }

    .live{
      font-size:10px;
      font-weight:700;
      color:#bfffee;
      display:flex;
      align-items:center;
      gap:5px;
      white-space:nowrap;
    }

    .dot{
      width:7px;height:7px;border-radius:50%;
      background:var(--green);
      box-shadow:0 0 10px var(--green);
      animation:blink 1.2s infinite;
    }

    @keyframes blink{50%{opacity:.35}}

    .bar{
      padding:6px 8px;
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
    }

    .chips{
      display:flex;
      gap:5px;
      flex-wrap:wrap;
    }

    .chip{
      border:1px solid var(--lineSoft);
      background:rgba(255,255,255,.05);
      color:var(--txt);
      border-radius:8px;
      font-size:9px;
      font-weight:700;
      letter-spacing:.8px;
      padding:5px 7px;
      text-transform:uppercase;
      cursor:pointer;
    }

    .chip.active{
      background:rgba(40,232,255,.18);
      box-shadow:0 0 10px rgba(40,232,255,.25);
    }

    .main{
      min-height:0;
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:8px;
    }

    .hero{
      padding:8px;
    }

    .pair{
      font-size:9px;
      letter-spacing:1.5px;
      text-transform:uppercase;
      color:var(--muted);
    }

    .price{
      font-family:'Orbitron',sans-serif;
      font-size:48px;
      font-weight:900;
      line-height:1.02;
      margin-top:3px;
      text-shadow:0 0 18px rgba(40,232,255,.45);
      letter-spacing:.5px;
    }

    .change{
      font-family:'Orbitron',sans-serif;
      font-size:20px;
      font-weight:800;
      margin-top:2px;
    }

    .up{color:var(--green);text-shadow:0 0 14px rgba(0,255,157,.45)}
    .down{color:var(--red);text-shadow:0 0 14px rgba(255,79,103,.45)}

    canvas{
      margin-top:8px;
      width:100%;
      height:160px;
      border-radius:10px;
      border:1px solid var(--lineSoft);
      background:rgba(255,255,255,.03);
      display:block;
    }

    .tape{
      margin-top:6px;
      border-top:1px solid rgba(255,255,255,.06);
      padding-top:5px;
      font-size:9px;
      display:flex;
      gap:8px;
      white-space:nowrap;
      overflow:hidden;
      color:var(--muted);
    }

    .track{
      display:inline-flex;
      gap:12px;
      min-width:max-content;
      animation:scroll 20s linear infinite;
    }

    @keyframes scroll{to{transform:translateX(-50%)}}
    .buy{color:var(--green)}
    .sell{color:var(--red)}

    .metricsWrap{
      min-height:0;
      display:grid;
      grid-template-rows:auto auto auto;
      gap:8px;
    }

    .metrics{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:6px;
    }

    .card{
      padding:7px 8px;
    }

    .label{
      font-size:10px;
      letter-spacing:1.2px;
      color:var(--muted);
      text-transform:uppercase;
      font-weight:700;
    }

    /* THIS is the key fix: large readable values */
    .value{
      margin-top:2px;
      font-family:'Orbitron',sans-serif;
      font-size:18px;
      line-height:1.08;
      font-weight:900;
      color:#f4feff;
      text-shadow:0 0 12px rgba(40,232,255,.5);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .split{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:6px;
    }

    .order{
      padding:7px;
    }

    .order h4,.gauge h4,.alerts h4{
      font-size:9px;
      letter-spacing:1.4px;
      color:var(--muted);
      text-transform:uppercase;
      margin-bottom:5px;
    }

    .line{
      position:relative;
      height:16px;
      border-radius:6px;
      background:rgba(255,255,255,.04);
      margin-bottom:4px;
      overflow:hidden;
      font-size:8px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 6px;
    }

    .fillBid,.fillAsk{
      position:absolute;left:0;top:0;bottom:0;opacity:.35;
    }

    .fillBid{background:linear-gradient(90deg,rgba(0,255,157,.7),rgba(0,255,157,.08))}
    .fillAsk{background:linear-gradient(90deg,rgba(255,79,103,.7),rgba(255,79,103,.08))}

    .gauge{
      padding:7px;
      display:grid;
      place-items:center;
    }

    .gwrap{
      width:92px;height:92px;position:relative;
    }

    .gwrap svg{width:100%;height:100%;transform:rotate(-90deg)}
    .gtext{
      position:absolute;inset:0;
      display:grid;place-items:center;
      font-family:'Orbitron',sans-serif;
      font-size:18px;font-weight:900;
    }

    .glabel{
      margin-top:2px;
      font-size:9px;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:1px;
    }

    .alerts{
      padding:7px;
    }

    .alertRow{
      display:grid;
      grid-template-columns:1fr auto;
      gap:5px;
    }

    .ainput{
      border:1px solid var(--lineSoft);
      background:rgba(255,255,255,.05);
      color:var(--txt);
      font-size:10px;
      border-radius:8px;
      padding:6px 7px;
      outline:none;
    }

    .abtn{
      border:1px solid var(--lineSoft);
      background:rgba(255,255,255,.08);
      color:var(--txt);
      border-radius:8px;
      padding:6px 8px;
      font-size:9px;
      font-weight:700;
      cursor:pointer;
    }

    .alist{
      margin-top:5px;
      max-height:36px;
      overflow:auto;
      font-size:9px;
      color:var(--muted);
    }

    .foot{
      padding:6px 10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:9px;
      color:var(--muted);
      letter-spacing:.8px;
    }

    .foot strong{
      color:var(--txt);
      font-family:'Orbitron',sans-serif;
      font-size:8px;
    }

    .clock{
      font-family:'Orbitron',sans-serif;
      color:var(--cyan);
      font-size:10px;
      text-shadow:0 0 10px rgba(40,232,255,.45);
      white-space:nowrap;
    }

    /* 4x8 portrait/widget hard lock */
    @media (max-width:500px){
      .price{font-size:44px}
      .change{font-size:18px}
      .value{font-size:17px}
      canvas{height:150px}
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="top glass">
      <div class="brand">
        <div class="btc">₿</div>
        <div class="titles">
          <div class="title">HYTE Y70 • BTC TRILLION TERMINAL Ω</div>
          <div class="sub">IFRAME OPTIMIZED • BINANCE LIVE</div>
        </div>
      </div>
      <div class="live"><span class="dot"></span>LIVE</div>
    </header>

    <section class="bar glass">
      <div class="chips" id="timeframes">
        <button class="chip active" data-tf="1m">1M</button>
        <button class="chip" data-tf="5m">5M</button>
        <button class="chip" data-tf="15m">15M</button>
        <button class="chip" data-tf="1h">1H</button>
      </div>
      <div class="chips" id="themes">
        <button class="chip active" data-theme="cyber">CYBER</button>
        <button class="chip" data-theme="gold">GOLD</button>
        <button class="chip" data-theme="red">RED</button>
      </div>
    </section>

    <main class="main">
      <section class="hero glass">
        <div class="pair">BTC / USDT</div>
        <div class="price" id="price">LOADING...</div>
        <div class="change" id="change">--</div>
        <canvas id="chart"></canvas>

        <div class="tape">
          <div class="track" id="trackA"></div>
          <div class="track" id="trackB"></div>
        </div>
      </section>

      <section class="metricsWrap">
        <div class="metrics">
          <div class="card glass"><div class="label">24H HIGH</div><div class="value" id="high">--</div></div>
          <div class="card glass"><div class="label">24H LOW</div><div class="value" id="low">--</div></div>
          <div class="card glass"><div class="label">24H VOLUME</div><div class="value" id="volume">--</div></div>
          <div class="card glass"><div class="label">QUOTE VOLUME</div><div class="value" id="quoteVolume">--</div></div>
          <div class="card glass"><div class="label">24H RANGE</div><div class="value" id="range">--</div></div>
          <div class="card glass"><div class="label">SENTIMENT</div><div class="value" id="sentiment">NEUTRAL</div></div>
        </div>

        <div class="split">
          <div class="order glass">
            <h4>ORDER BOOK PRESSURE</h4>
            <div id="orderLines"></div>
          </div>

          <div class="gauge glass">
            <h4>FEAR • GREED</h4>
            <div class="gwrap">
              <svg viewBox="0 0 120 120">
                <circle cx="60" cy="60" r="46" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="10"/>
                <circle id="gArc" cx="60" cy="60" r="46" fill="none" stroke="url(#gg)" stroke-width="10" stroke-linecap="round" stroke-dasharray="289" stroke-dashoffset="289"/>
                <defs>
                  <linearGradient id="gg" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#ff4f67"/>
                    <stop offset="50%" stop-color="#ffb84d"/>
                    <stop offset="100%" stop-color="#00ff9d"/>
                  </linearGradient>
                </defs>
              </svg>
              <div class="gtext" id="gText">50</div>
            </div>
            <div class="glabel" id="gLabel">NEUTRAL</div>
          </div>
        </div>

        <div class="alerts glass">
          <h4>PRICE ALERTS</h4>
          <div class="alertRow">
            <input id="aInput" class="ainput" type="number" placeholder="BTC price e.g. 70000">
            <button id="aBtn" class="abtn">ADD</button>
          </div>
          <div class="alist" id="aList">No alerts set</div>
        </div>
      </section>
    </main>

    <footer class="foot glass">
      <div><strong>ULTRA MODE</strong> • EXECUTIVE CRYPTO WIDGET</div>
      <div class="clock" id="clock">--</div>
    </footer>
  </div>

  <script>
    const canvas = document.getElementById("chart");
    const ctx = canvas.getContext("2d");

    let prices = [];
    let lastPrice = null;
    let tf = "1m";
    let timer = null;
    let updateMs = 1000;
    const alerts = [];

    const tfSpeed = { "1m":1000, "5m":1800, "15m":2800, "1h":4200 };

    function resizeCanvas(){
      canvas.width = canvas.clientWidth;
      canvas.height = canvas.clientHeight;
      drawChart();
    }
    addEventListener("resize", resizeCanvas);
    resizeCanvas();

    function usd(n,d=2){
      return "$" + Number(n).toLocaleString(undefined,{minimumFractionDigits:d,maximumFractionDigits:d});
    }

    function compact(n){
      return Number(n).toLocaleString(undefined,{maximumFractionDigits:2});
    }

    function drawChart(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      if(prices.length<2) return;

      const min=Math.min(...prices);
      const max=Math.max(...prices);
      const range=(max-min)||1;
      const pad=10;

      const g=ctx.createLinearGradient(0,0,canvas.width,0);
      g.addColorStop(0,"#28e8ff");
      g.addColorStop(.5,"#2e8bff");
      g.addColorStop(1,"#ffb84d");

      ctx.beginPath();
      prices.forEach((p,i)=>{
        const x=i*(canvas.width/Math.max(prices.length-1,1));
        const y=canvas.height-(((p-min)/range)*(canvas.height-pad*2)+pad);
        if(i===0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
      });

      ctx.strokeStyle=g;
      ctx.lineWidth=3;
      ctx.shadowBlur=15;
      ctx.shadowColor="rgba(40,232,255,.65)";
      ctx.stroke();

      ctx.lineTo(canvas.width,canvas.height);
      ctx.lineTo(0,canvas.height);
      ctx.closePath();

      const fill=ctx.createLinearGradient(0,0,0,canvas.height);
      fill.addColorStop(0,"rgba(40,232,255,.26)");
      fill.addColorStop(1,"rgba(40,232,255,0)");
      ctx.shadowBlur=0;
      ctx.fillStyle=fill;
      ctx.fill();
    }

    function setGauge(v){
      const arc=document.getElementById("gArc");
      const t=document.getElementById("gText");
      const l=document.getElementById("gLabel");
      const C=289;
      const p=Math.max(0,Math.min(100,v))/100;
      arc.style.strokeDashoffset=String(C*(1-p));
      t.textContent=Math.round(v);

      if(v>=67){ l.textContent="GREED"; l.style.color="#00ff9d"; }
      else if(v<=33){ l.textContent="FEAR"; l.style.color="#ff4f67"; }
      else { l.textContent="NEUTRAL"; l.style.color="#e9fbff"; }
    }

    function updateOrderSim(price){
      const wrap=document.getElementById("orderLines");
      wrap.innerHTML="";
      for(let i=0;i<4;i++){
        const bp=price-(Math.random()*60+i*16);
        const ap=price+(Math.random()*60+i*16);
        const bs=25+Math.random()*70;
        const as=25+Math.random()*70;

        const b=document.createElement("div");
        b.className="line";
        b.innerHTML=`<div class="fillBid" style="width:${bs}%"></div><span>BID ${usd(bp,0)}</span><span>${bs.toFixed(0)}%</span>`;
        wrap.appendChild(b);

        const a=document.createElement("div");
        a.className="line";
        a.innerHTML=`<div class="fillAsk" style="width:${as}%"></div><span>ASK ${usd(ap,0)}</span><span>${as.toFixed(0)}%</span>`;
        wrap.appendChild(a);
      }
    }

    function updateTape(price){
      const a=document.getElementById("trackA");
      const b=document.getElementById("trackB");
      let html="";
      for(let i=0;i<18;i++){
        const side=Math.random()>.5?"buy":"sell";
        const px=price+(Math.random()-.5)*120;
        const qty=(Math.random()*1.9+.02).toFixed(3);
        html += `<span class="${side}">${side.toUpperCase()} ${usd(px,2)} • ${qty} BTC</span>`;
      }
      a.innerHTML=html;
      b.innerHTML=html;
    }

    function renderAlerts(){
      const box=document.getElementById("aList");
      if(!alerts.length){ box.textContent="No alerts set"; return; }
      box.innerHTML=alerts.map(x=>`${usd(x.value,2)} — ${x.hit?"TRIGGERED":"ACTIVE"}`).join("<br>");
    }

    function checkAlerts(p){
      alerts.forEach(a=>{
        if(a.hit || lastPrice===null) return;
        const cross=(lastPrice<a.value && p>=a.value)||(lastPrice>a.value && p<=a.value);
        if(cross) a.hit=true;
      });
      renderAlerts();
    }

    function sentimentFromChange(ch){
      const s=document.getElementById("sentiment");
      let gauge=50;

      if(ch>2){ s.textContent="STRONG BULL"; s.style.color="#00ff9d"; gauge=82; }
      else if(ch>0.5){ s.textContent="BULLISH"; s.style.color="#82ffd0"; gauge=68; }
      else if(ch<-2){ s.textContent="STRONG BEAR"; s.style.color="#ff4f67"; gauge=20; }
      else if(ch<-0.5){ s.textContent="BEARISH"; s.style.color="#ff8ea0"; gauge=34; }
      else{ s.textContent="NEUTRAL"; s.style.color="#f4feff"; gauge=50; }

      setGauge(gauge);
    }

    async function update(){
      try{
        const res=await fetch("https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT");
        const d=await res.json();

        const p=parseFloat(d.lastPrice);
        const h=parseFloat(d.highPrice);
        const l=parseFloat(d.lowPrice);
        const v=parseFloat(d.volume);
        const q=parseFloat(d.quoteVolume);
        const c=parseFloat(d.priceChangePercent);

        prices.push(p);
        const maxPts = tf==="1m"?100:tf==="5m"?130:tf==="15m"?160:190;
        if(prices.length>maxPts) prices.shift();
        drawChart();

        const priceEl=document.getElementById("price");
        priceEl.textContent=usd(p,2);

        const ch=document.getElementById("change");
        ch.textContent=(c>=0?"+":"")+c.toFixed(2)+"%";
        ch.className="change "+(c>=0?"up":"down");

        document.getElementById("high").textContent=usd(h,2);
        document.getElementById("low").textContent=usd(l,2);
        document.getElementById("volume").textContent=compact(v);
        document.getElementById("quoteVolume").textContent=usd(q,0);
        document.getElementById("range").textContent=usd(h-l,2);

        sentimentFromChange(c);
        updateOrderSim(p);
        updateTape(p);

        checkAlerts(p);
        lastPrice=p;
      }catch(e){
        document.getElementById("price").textContent="OFFLINE";
      }
    }

    function tickClock(){
      document.getElementById("clock").textContent=new Date().toLocaleString();
    }

    function restart(){
      if(timer) clearInterval(timer);
      updateMs=tfSpeed[tf]||1000;
      timer=setInterval(update,updateMs);
    }

    document.getElementById("timeframes").addEventListener("click",(e)=>{
      const b=e.target.closest("button[data-tf]");
      if(!b) return;
      document.querySelectorAll("#timeframes .chip").forEach(x=>x.classList.remove("active"));
      b.classList.add("active");
      tf=b.dataset.tf;
      restart();
    });

    document.getElementById("themes").addEventListener("click",(e)=>{
      const b=e.target.closest("button[data-theme]");
      if(!b) return;
      document.querySelectorAll("#themes .chip").forEach(x=>x.classList.remove("active"));
      b.classList.add("active");
      const t=b.dataset.theme;
      if(t==="gold"){
        document.documentElement.style.setProperty("--cyan","#ffd166");
        document.documentElement.style.setProperty("--blue","#ff9f43");
      }else if(t==="red"){
        document.documentElement.style.setProperty("--cyan","#ff6b81");
        document.documentElement.style.setProperty("--blue","#ff4f67");
      }else{
        document.documentElement.style.setProperty("--cyan","#28e8ff");
        document.documentElement.style.setProperty("--blue","#2e8bff");
      }
      drawChart();
    });

    document.getElementById("aBtn").addEventListener("click",()=>{
      const val=parseFloat(document.getElementById("aInput").value);
      if(!isFinite(val) || val<=0) return;
      alerts.push({value:val,hit:false});
      document.getElementById("aInput").value="";
      renderAlerts();
    });

    tickClock();
    update();
    restart();
    setInterval(tickClock,1000);
  </script>
</body>
</html>
